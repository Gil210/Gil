<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia</title>
    <style>
        img{
            height: auto;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <figure>
        <img src="/Images/Basic structure of HTML Page.webp" alt="HTML structure"><figcaption> Fig 1. Structure Of HTML Page.</figcaption>
       <img src="/Images/Coding.jpg" alt="coder"><figcaption>Fig 2. Line Of Code</figcaption>
   <img src="/Images/HTML Diagram.jpg"alt="Semantic HTML"><figcaption> Fig 3. Semantic HTML</figcaption>
        <audio controls>
            <source src="/Audio/Mask Off (Bells Remix).mp3" type="audio/mp3">
            <source src="/Audio/Mask Off (Bells Remix).ogg" type="audio/ogg">
            <p>This browser doesn't support this type of audio</p>
        </audio>
        <figcaption>Fig 4. Random Audio</figcaption>
        <video controls poster="/Images/Big Buck Bunny.webp">
            <source src="/Video/Dumb_Bunny.mp4" type="video/mp4">
            <source src="/Video/Dumb_Bunny.wav" type="video/wav">
        </video>
        <figcaption>Fig 5: Video With Poster</figcaption>
    </figure>
</body>
</html>
